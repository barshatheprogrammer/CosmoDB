<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responses — FormsCosmo</title>
    <meta name="description" content="View and analyze form responses." />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/responses.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <a href="index.html" class="btn btn-ghost btn-sm">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M19 12H5M12 5l-7 7 7 7" />
                </svg>
                Back
            </a>
            <span style="color:var(--border)">|</span>
            <h2 id="formTitleNav"
                style="font-size:1rem;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px;">
                Loading...</h2>
        </div>
        <div class="navbar-actions">
            <a id="viewFormLink" href="#" target="_blank" class="btn btn-secondary btn-sm">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                    <polyline points="15 3 21 3 21 9" />
                    <line x1="10" y1="14" x2="21" y2="3" />
                </svg>
                Open Form
            </a>
            <button class="btn btn-ghost btn-sm" id="exportCsvBtn">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Export CSV
            </button>
        </div>
    </nav>

    <!-- Loading -->
    <div id="loadingState"
        style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:16px;color:var(--text-muted);">
        <div class="spinner"></div>
        <p>Loading responses...</p>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="hidden" style="max-width:1100px;margin:0 auto;padding:32px 24px 80px;">

        <!-- Summary Banner -->
        <div class="summary-banner" id="summaryBanner">
            <div class="summary-stat">
                <span class="summary-number" id="totalResponseCount">0</span>
                <span class="summary-label">Total Responses</span>
            </div>
            <div class="summary-stat">
                <span class="summary-number" id="lastResponseDate">—</span>
                <span class="summary-label">Last Response</span>
            </div>
            <div class="summary-stat">
                <span class="summary-number" id="totalQuestions">0</span>
                <span class="summary-label">Questions</span>
            </div>
            <div class="summary-actions">
                <button class="btn btn-ghost btn-sm" id="deleteAllBtn">🗑️ Delete All</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="resp-tab-group" id="respTabs">
            <button class="resp-tab active" data-tab="summary" id="summaryTabBtn">📊 Summary</button>
            <button class="resp-tab" data-tab="individual" id="individualTabBtn">📋 Individual</button>
        </div>

        <!-- Summary Tab -->
        <div id="summaryTab">
            <div id="questionSummaryContainer">
                <!-- Per-question summaries rendered by JS -->
            </div>
            <div id="noResponsesMsg" class="empty-state hidden">
                <span class="empty-icon">📭</span>
                <h3>No responses yet</h3>
                <p>Share your form to start collecting responses.</p>
            </div>
        </div>

        <!-- Individual Responses Tab -->
        <div id="individualTab" class="hidden">
            <div class="responses-nav" id="responsesNav">
                <button class="btn btn-ghost btn-sm" id="prevResponseBtn" disabled>← Prev</button>
                <span id="responseCounter" class="response-counter">Response 1 of 0</span>
                <button class="btn btn-ghost btn-sm" id="nextResponseBtn" disabled>Next →</button>
            </div>
            <div id="individualResponseContainer"></div>
        </div>

    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/responses.js"></script>
</body>

</html>
